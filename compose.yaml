services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DATABASE_URL: mysql://app:ChangeMe!@database:3306/app?serverVersion=10.11.2-MariaDB&charset=utf8mb4
      MAILER_DSN: smtp://mailer:1025
    depends_on:
      database:
        condition: service_healthy
      mailer:
        condition: service_started
    command: php -S 0.0.0.0:8000 -t public

  database:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-app}
      MARIADB_USER: ${MARIADB_USER:-app}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-ChangeMe!}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - database_data:/var/lib/mysql:rw

  mailer:
    image: axllent/mailpit
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  database_data:
